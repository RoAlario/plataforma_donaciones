<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Olvidé mi contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F4F4F4; font-family: 'Roboto', sans-serif; }
    .card {
      max-width: 420px; margin: 60px auto; background: #fff;
      border-radius: 20px; padding: 40px 36px; box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .logo { width: 70px; display: block; margin: 0 auto 20px; }
    h2 { font-size: 28px; font-weight: 600; margin-bottom: 6px; }
    .subtitulo { font-size: 15px; color: #555; margin-bottom: 24px; }
    .form-control {
      border-radius: 10px; border: 1.5px solid #ddd;
      padding: 12px 14px; font-size: 16px; margin-bottom: 14px;
    }
    .form-control:focus { border-color: #FD8223; box-shadow: 0 0 0 3px rgba(253,130,35,.15); }
    .form-control.is-invalid { border-color: #CD1800; }
    .error-msg { color: #CD1800; font-size: 14px; margin-top: -10px; margin-bottom: 12px; }
    .btn-enviar {
      width: 100%; background: #FD8223; color: #fff;
      border: none; border-radius: 12px; padding: 14px; font-size: 17px; font-weight: 500;
    }
    .btn-enviar:hover { background: #e06e10; }
    .pie { text-align: center; margin-top: 16px; font-size: 14px; }
    .pie a { color: #FD8223; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">
    <h2>Olvidé mi contraseña</h2>
    <p class="subtitulo">Ingresá tu email y te enviamos un código para restablecerla.</p>

    {% if error %}<p class="error-msg">{{ error }}</p>{% endif %}

    <form method="POST">
      <input type="email" name="email" class="form-control {% if error %}is-invalid{% endif %}"
             placeholder="tucorreo@gmail.com">
      <button type="submit" class="btn-enviar">Enviar código</button>
    </form>

    <p class="pie"><a href="{{ url_for('login') }}">← Volver al inicio de sesión</a></p>
  </div>
</body>
</html>
