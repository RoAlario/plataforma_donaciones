<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verificar código</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F4F4F4; font-family: 'Roboto', sans-serif; }
    .card-verificar {
      max-width: 380px; margin: 60px auto; background: #fff;
      border-radius: 20px; padding: 40px 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08); text-align: center;
    }
    .logo { width: 65px; margin-bottom: 16px; }
    h2 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
    .descripcion { font-size: 15px; color: #555; margin-bottom: 28px; }
    .codigos { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .codigos input {
      width: 48px; height: 54px; text-align: center;
      font-size: 22px; font-weight: 600;
      border: 2px solid #FD8223; border-radius: 10px; outline: none;
    }
    .codigos input:focus { border-color: #e06e10; box-shadow: 0 0 0 3px rgba(253,130,35,.15); }
    .btn-verificar {
      width: 100%; background: #FD8223; color: #fff;
      border: none; border-radius: 12px; padding: 14px; font-size: 17px; font-weight: 500;
    }
    .btn-verificar:hover { background: #e06e10; }
    .error { color: #CD1800; font-size: 14px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card-verificar">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">
    <h2>Verificá tu identidad</h2>
    <p class="descripcion">Ingresá el código de 6 dígitos que te enviamos al email.</p>

    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="POST">
      <div class="codigos">
        {% for i in range(1, 7) %}
          <input type="text" name="d{{ i }}" maxlength="1" inputmode="numeric" autocomplete="off"
                 oninput="moverFoco(this, {{ i }})">
        {% endfor %}
      </div>
      <button type="submit" class="btn-verificar">Confirmar código →</button>
    </form>
  </div>

  <script>
    function moverFoco(input, numero) {
      input.value = input.value.replace(/\D/g, '');
      if (input.value.length === 1 && numero < 6) {
        input.parentElement.querySelectorAll('input')[numero].focus();
      }
    }
    document.querySelectorAll('.codigos input').forEach((inp, idx, arr) => {
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !inp.value && idx > 0) arr[idx - 1].focus();
      });
    });
  </script>
</body>
</html>
