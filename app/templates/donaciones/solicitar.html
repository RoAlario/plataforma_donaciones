<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solicitar Donación</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    :root { --naranja: #f27036; --naranja-hover: #a63b00; --texto: #121c2a; --texto-suave: #584239; --borde: #dfc0b4; }
    body { font-family: 'Inter', sans-serif; background: #f8f9ff; color: var(--texto); }
    .form-card { background: #fff; border-radius: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); padding: 2rem; max-width: 560px; margin: 2rem auto; }
    .input-custom { width: 100%; padding: 10px 14px; border: 1px solid var(--borde); border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; }
    .input-custom:focus { border-color: var(--naranja); box-shadow: 0 0 0 3px rgba(242,112,54,0.15); }
    .btn-publicar { width: 100%; padding: 14px; background: var(--naranja); color: #fff; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; }
    .btn-publicar:hover { background: var(--naranja-hover); }
    .btn-volver { font-size: 14px; color: var(--texto-suave); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container py-5" style="max-width:560px;">
    <a href="{{ url_for('donaciones.detalle', id=publicacion.nroPublicacion) }}" class="btn-volver mb-4 d-inline-flex">
      <span class="material-symbols-outlined">arrow_back</span> Volver
    </a>

    {% if ya_solicito %}
      <div class="form-card text-center py-5">
        <div style="font-size:48px;">✅</div>
        <h2 class="fw-semibold mt-3">Ya solicitaste esta donación</h2>
        <p class="text-muted">Esperá a que el donante responda.</p>
      </div>
    {% else %}
      <div class="form-card">
        <h1 class="fw-bold mb-2" style="font-size:20px;">Solicitar donación</h1>
        <p class="text-muted mb-4" style="font-size:14px;">{{ publicacion.titulo }}</p>

        <form method="POST">
          <label style="font-size:13px; font-weight:500; display:block; margin-bottom:6px;">
            ¿Por qué necesitás esta donación? <span class="text-danger">*</span>
          </label>
          <textarea name="razon" class="input-custom mb-1" rows="5"
                    placeholder="Explicá brevemente por qué solicitás este producto..."
                    required minlength="10"></textarea>
          {% if errores.razon %}
            <div class="text-danger mb-2" style="font-size:12px;">{{ errores.razon }}</div>
          {% endif %}

          <button type="submit" class="btn-publicar mt-3">Enviar solicitud</button>
        </form>

        <div class="text-center mt-3">
          <a href="{{ url_for('donaciones.detalle', id=publicacion.nroPublicacion) }}" class="btn-volver">← Cancelar</a>
        </div>
      </div>
    {% endif %}
  </div>
</body>
</html>
