<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nueva contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F4F4F4; font-family: 'Roboto', sans-serif; }
    .card {
      max-width: 420px; margin: 60px auto; background: #fff;
      border-radius: 20px; padding: 40px 36px; box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .logo { width: 70px; display: block; margin: 0 auto 20px; }
    h2 { font-size: 28px; font-weight: 600; margin-bottom: 6px; }
    .subtitulo { font-size: 15px; color: #555; margin-bottom: 24px; }
    .form-control {
      border-radius: 10px; border: 1.5px solid #ddd;
      padding: 12px 14px; font-size: 16px; margin-bottom: 12px;
    }
    .form-control:focus { border-color: #FD8223; box-shadow: 0 0 0 3px rgba(253,130,35,.15); }
    .form-control.is-invalid { border-color: #CD1800; }
    .error-msg { color: #CD1800; font-size: 13px; margin-top: -8px; margin-bottom: 10px; }
    .btn-guardar {
      width: 100%; background: #FD8223; color: #fff;
      border: none; border-radius: 12px; padding: 14px; font-size: 17px; font-weight: 500;
    }
    .btn-guardar:hover { background: #e06e10; }
  </style>
</head>
<body>
  <div class="card">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">
    <h2>Nueva contraseña</h2>
    <p class="subtitulo">Ingresá tu nueva contraseña.</p>

    <form method="POST">
      <input type="password" name="contrasena"
             class="form-control {% if errores.contrasena %}is-invalid{% endif %}"
             placeholder="Nueva contraseña">
      {% if errores.contrasena %}
        <p class="error-msg">{{ errores.contrasena }}</p>
      {% endif %}

      <input type="password" name="repetir_contrasena"
             class="form-control {% if errores.repetir_contrasena %}is-invalid{% endif %}"
             placeholder="Repetir contraseña">
      {% if errores.repetir_contrasena %}
        <p class="error-msg">{{ errores.repetir_contrasena }}</p>
      {% endif %}

      <button type="submit" class="btn-guardar">Guardar contraseña</button>
    </form>
  </div>
</body>
</html>
