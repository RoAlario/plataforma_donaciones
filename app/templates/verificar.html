<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verificá tu cuenta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F4F4F4; font-family: 'Roboto', sans-serif; }
    .card-verificar {
      max-width: 380px; margin: 60px auto;
      background: #fff; border-radius: 20px;
      padding: 40px 32px; box-shadow: 0 4px 20px rgba(0,0,0,.08);
      text-align: center;
    }
    .logo { width: 65px; margin-bottom: 16px; }
    h2 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
    .descripcion { font-size: 15px; color: #555; margin-bottom: 28px; line-height: 1.5; }
    .codigos { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .codigos input {
      width: 48px; height: 54px; text-align: center;
      font-size: 22px; font-weight: 600;
      border: 2px solid #FD8223; border-radius: 10px; outline: none;
    }
    .codigos input:focus { border-color: #e06e10; box-shadow: 0 0 0 3px rgba(253,130,35,.15); }
    .btn-verificar {
      width: 100%; background: #FD8223; color: #fff;
      border: none; border-radius: 12px; padding: 14px;
      font-size: 17px; font-weight: 500;
    }
    .btn-verificar:hover { background: #e06e10; }
    .reenviar { margin-top: 18px; font-size: 14px; color: #555; }
    .reenviar a { color: #FD8223; font-weight: 500; text-decoration: none; }
    .error { color: #CD1800; font-size: 14px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card-verificar">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">
    <h2>Verificá tu cuenta</h2>
    <p class="descripcion">
      Enviamos un código de 6 dígitos a tu correo.<br>
      Ingresalo para activar tu cuenta.
    </p>

    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="POST">
      <div class="codigos">
        {% for i in range(1, 7) %}
          <input type="text" name="d{{ i }}" maxlength="1" inputmode="numeric" autocomplete="off"
                 oninput="moverFoco(this, {{ i }})">
        {% endfor %}
      </div>
      <button type="submit" class="btn-verificar">Verificar y comenzar →</button>
    </form>

    <p class="reenviar">
      ¿No recibiste el código?
      <a href="{{ url_for('auth.reenviar_codigo_registro') }}">Reenviar código</a>
    </p>
  </div>

  <script>
  const inputs = document.querySelectorAll('.codigos input');

  inputs.forEach((inp, idx, arr) => {
    inp.addEventListener('input', e => {
      const val = inp.value.replace(/\D/g, '');
      inp.value = val.slice(0, 1);
      if (inp.value && idx < arr.length - 1) arr[idx + 1].focus();
    });

    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && idx > 0) arr[idx - 1].focus();
    });

    inp.addEventListener('paste', e => {
      e.preventDefault();
      const pegado = (e.clipboardData || window.clipboardData)
        .getData('text').replace(/\D/g, '').slice(0, 6);
      pegado.split('').forEach((char, i) => {
        if (arr[i]) arr[i].value = char;
      });
      const ultimo = Math.min(pegado.length, arr.length - 1);
      arr[ultimo].focus();
    });
  });
</script>
</body>
</html>
